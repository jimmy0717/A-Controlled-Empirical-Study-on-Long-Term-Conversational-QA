# Mem0-Lite with a stronger 14B extractor (recommended ablation).
# A800 80G easily runs 14B in bf16 (~28 GB) alongside the 7B generator and
# BGE-M3 encoder; or you can run 14B alone via vLLM and have it serve both
# extraction and generation requests.
experiment: { name: "mem0_lite_14b", output_dir: "results/mem0_lite_14b", seed: 42, num_questions: 50 }
data:        { split: "longmemeval_s", data_dir: "data/longmemeval" }
retriever:   { name: "mem0_lite", top_k: 50, budget_tokens: 1024 }
mem0_lite:
  extractor_model:   "models/Qwen2.5-14B-Instruct"
  extractor_backend: "hf"
  updater_model:     "models/Qwen2.5-14B-Instruct"
  encoder:           "models/bge-m3"
  similarity_threshold:  0.75
  max_memories_per_pair: 8
generator:   { backend: "hf",     model: "models/Qwen2.5-7B-Instruct",  max_new_tokens: 512, temperature: 0.0, top_p: 1.0 }
judge:       { backend: "openai", model: "deepseek-v4-flash", max_new_tokens: 128, temperature: 0.0 }
