# Optional: full-haystack baseline (only feasible with long-context Qwen2.5-1M
# variants or vLLM + cache). Skip if you don't have a 128K-context model.
experiment: { name: "full_ctx", output_dir: "results/full_ctx", seed: 42, num_questions: 200 }
data:        { split: "longmemeval_s", data_dir: "data/longmemeval" }
retriever:   { name: "full_ctx", top_k: 0, budget_tokens: 0 }
generator:
  backend:  "hf"
  model:    "models/Qwen2.5-7B-Instruct"
  max_new_tokens: 512
  temperature: 0.0
  top_p: 1.0
judge:       { backend: "openai", model: "deepseek-v4-flash", max_new_tokens: 128, temperature: 0.0 }
